<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <!-- NAV -->
    <nav class="navbar justify-content-center" style="background-color: #212529">
        <span class="navbar-brand text-white fw-bold">
            <h1>PHP/JS CRUD Project</h1>
        </span>
    </nav>

    <main class="container py-5 d-flex flex-column gap-4">

        <!-- SEÇÃO: USERS -->
        <div class="card p-5">
            <h2 class="fs-1 fw-bold mb-4">Users</h2>
            <section id="user-list" class="row row-cols-2 g-4">
                <!-- Cards renderizados pelo JS -->
            </section>
        </div>

        <!-- SEÇÃO: CREATE USER -->
        <div class="card p-5">
            <h2 class="fs-1 fw-bold mb-4">Create User</h2>
            <table class="w-100">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Age</th>
                        <th>Email</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="pe-3"><input type="text" class="form-control" id="inputName" placeholder="Name"></td>
                        <td class="pe-3"><input type="number" class="form-control" id="inputAge" placeholder="Age"></td>
                        <td class="pe-3"><input type="email" class="form-control" id="inputEmail" placeholder="Email">
                        </td>
                        <td><button id="createButton" class="btn btn-dark">Create</button></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- SEÇÃO: EDIT USER (oculta por padrão) -->
        <div class="card p-5" id="edit-section" style="display: none !important;">
            <h2 class="fs-1 fw-bold mb-4">Edit User</h2>
            <input type="hidden" id="editId">
            <table class="w-100">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Age</th>
                        <th>Email</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="pe-3"><input type="text" placeholder="Name" class="form-control" id="editName"></td>
                        <td class="pe-3"><input type="number" placeholder="Age" class="form-control" id="editAge"></td>
                        <td class="pe-3"><input type="email" placeholder="Email" class="form-control" id="editEmail">
                        </td>
                        <td class="d-flex gap-2">
                            <button id="updateButton" class="btn btn-dark">Update</button>
                            <button id="cancelButton" class="btn btn-outline-secondary">Cancel</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </main>

    <script src="app.js" type="module"></script>
</body>

</html>
