<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <!-- NAV -->
    <nav class="navbar justify-content-center" style="background-color: #212529">
        <span class="navbar-brand text-white fw-bold">
            <h1>PHP/JS CRUD Project</h1>
        </span>
    </nav>

    <main class="container py-5 d-flex flex-column gap-4">

        <!-- SEÇÃO: USERS -->
        <div class="card p-5">
            <h2 class="fs-1 fw-bold mb-4">Users</h2>
            <section id="user-list" class="row row-cols-2 g-4">
                <!-- Cards renderizados pelo JS -->
            </section>
        </div>

        <!-- SEÇÃO: CREATE USER -->
        <form id="create-form" class="card p-5">
            <h2 class="fs-1 fw-bold mb-4">Create User</h2>
            <div class="d-flex gap-3 align-items-end">
                <div class="flex-fill">
                    <label class="form-label">Name</label>
                    <input type="text" class="form-control" id="inputName" placeholder="Name">
                </div>
                <div class="flex-fill">
                    <label class="form-label">Age</label>
                    <input type="number" class="form-control" id="inputAge" placeholder="Age">
                </div>
                <div class="flex-fill">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" id="inputEmail" placeholder="Email">
                </div>
                <div>
                    <button type="button" id="createButton" class="btn btn-dark">Create</button>
                </div>
            </div>
        </form>

        <!-- SEÇÃO: EDIT USER (oculta por padrão) -->
        <form id="edit-section" class="card p-5" style="display: none;">
            <h2 class="fs-1 fw-bold mb-4">Update User</h2>
            <input type="hidden" id="editId">
            <div class="d-flex gap-3 align-items-end">
                <div class="flex-fill">
                    <label class="form-label">Name</label>
                    <input type="text" class="form-control" id="editName" placeholder="Name">
                </div>
                <div class="flex-fill">
                    <label class="form-label">Age</label>
                    <input type="number" class="form-control" id="editAge" placeholder="Age">
                </div>
                <div class="flex-fill">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" id="editEmail" placeholder="Email">
                </div>
                <div>
                    <button type="button" id="cancelButton" class="btn btn-danger">Cancel</button>
                    <button type="button" id="updateButton" class="btn btn-dark">Update</button>
                </div>
            </div>
        </form>

    </main>

    <script src="app.js" type="module"></script>
</body>

</html>
