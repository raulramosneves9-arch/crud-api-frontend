<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="remote.css">
</head>

<body>
    <nav class="navbar justify-content-center" style="background-color: #212529">
        <span class="navbar-brand text-white fw-bold">
            <h1>PHP/JS CRUD Project</h1>
        </span>
    </nav>

    <main>
        <section>
            <article class="card p-5 m-5">
                <h3 class="fs-1 fw-bold">Users</h3>
                <span>No users found.</span>
                <div class="card"></div>
            </article>

            <article class="card p-5 m-5">
                <h2 class="fs-1 fw-bold">Create User</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Age</th>
                            <th>Email</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr style="gap:10px">
                            <td><input type="text" class="form-control"></td>
                            <td><input type="number" class="form-control"></td>
                            <td><input type="text" class="form-control"></td>
                            <td><button class="btn btn-dark">create</button></td>
                        </tr>
                    </tbody>
                </table>
            </article>
        </section>
    </main>
    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
