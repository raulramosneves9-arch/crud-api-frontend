<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="remote.css">
</head>

<body>
    <nav class="navbar justify-content-center" style="background-color: #212529">
        <span class="navbar-brand text-white fw-bold">
            <h1>PHP/JS CRUD Project</h1>
        </span>
    </nav>

    <main>
        <section class="row align-items-center justify-content-center">
            <article class="card p-5 m-5 col-12 col-md-8">
                <h3 class="fs-1 fw-bold pb-5">Users</h3>
                <span style="display: none;">No users found.</span>
                <div class="card row p-3 m-3">
                    <h5>Raul Ramos</h5>
                    <p>Age: 16</p>
                    <p>Email: raulramosnevs9@gmail.com</p>
                </div>
            </article>

            <article class="card p-5 m-5 col-12 col-md-8">
                <h2 class="fs-1 fw-bold pb-5">Create User</h2>
                <table class="w-100">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Age</th>
                            <th>Email</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr>
                            <td class="pe-3"><input type="text" class="form-control"></td>
                            <td class="pe-3"><input type="number" class="form-control"></td>
                            <td class="pe-3"><input type="text" class="form-control"></td>
                            <td><button class="btn btn-dark">create</button></td>
                        </tr>
                    </tbody>
                </table>
            </article>
        </section>
    </main>
    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
